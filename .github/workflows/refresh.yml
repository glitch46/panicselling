name: Refresh listings data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch listings
        run: node scripts/fetch-listings.js
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json
          git diff --quiet --cached && echo "No changes" && exit 0
          git commit -m "chore: refresh listings data"
          git push
