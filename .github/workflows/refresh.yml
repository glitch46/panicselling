name: Refresh listings data

on:
  schedule:
    # Midnight UTC daily. Uses one RentCast rental listing call and stale median cache.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch rental listings
        run: node scripts/fetch-rentals.js
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
          ALLOW_STALE_MEDIAN: '1'

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rentals.json
          git diff --quiet --cached && echo "No changes" && exit 0
          git commit -m "chore: refresh rentals data"
          git push
